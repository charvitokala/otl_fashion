<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Shim Su-ae Episodes</title>

    <link rel="stylesheet" href="style.css">

    <style>

        @font-face {
            font-family: 'Pixel Code';
            src: url('PixelCode.otf') format('opentype');
        }

        body{
            margin: 0;
            padding: 40px;
            background-image: url("wallpaper.jpg");
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        .window{
            width: 1200px;
            min-height: 850px;
            background-color: #ffb6d9;
            border-radius: 12px;
            margin: auto;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        }

        /* TITLE BAR */

        .titlebar{
            background-color: #ff66b3;
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .title-text{
            font-family: 'Pixel Code';
            color: black;
            font-size: 22px;
        }

        .buttons{
            display: flex;
            gap: 6px;
        }

        .btn{
            width: 18px;
            height: 18px;
            background-color: white;
            border: 2px solid #ffcce6;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #ff66b3;
            font-size: 10px;
            font-weight: bold;
        }

        /* TITLE */

        .main-title{
            font-family: 'Pixel Code';
            font-size: 65px;
            margin: 40px;
            color: black;
        }

        /* EPISODES GRID */

        .episodes-grid{
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 60px;
            padding: 40px;
        }

        /* FILE ICON */

        .episode-file{
            display: flex;
            flex-direction: column;
            align-items: center;
            text-decoration: none;
            color: black;
            transition: 0.2s;
        }

        .episode-file:hover{
            transform: translateY(-6px);
        }

        .episode-file img{
            width: 90px;
            image-rendering: pixelated;
        }

        .episode-file span{
            margin-top: 14px;
            font-family: 'Pixel Code';
            font-size: 18px;
            text-align: center;
        }

        /* NAV BUTTONS */

        .nav-buttons{
            display: flex;
            justify-content: space-between;
            padding: 30px 50px 50px 50px;
        }

        .back-btn,
        .next-btn{
            background-color: #ff66b3;
            color: white;
            font-family: 'Pixel Code';
            font-size: 20px;
            padding: 15px 30px;
            border: 3px solid white;
            text-decoration: none;
            box-shadow: 5px 5px 0px #ff99cc;
            transition: 0.2s;
        }

        .back-btn:hover,
        .next-btn:hover{
            background-color: #ff85c2;
            transform: translateY(-4px);
        }

    </style>

</head>

<body>

    <div class="window">

        <!-- TITLE BAR -->

        <div class="titlebar">

            <span class="title-text">
                SHIM SU-AE.exe
            </span>

            <div class="buttons">
                <div class="btn">_</div>
                <div class="btn">□</div>
                <div class="btn">X</div>
            </div>

        </div>

        <!-- TITLE -->

        <h1 class="main-title">
            Shim Su-ae Fashion in each Chapter
        </h1>

        <!-- EPISODES -->

<div class="episodes-grid" id="episodes-grid">
</div>

<!-- NAVIGATION -->

<div class="nav-buttons">

    <a href="eps.html" class="back-btn">
        ← BACK
    </a>

    <a href="ep1_suae.html" class="next-btn">
        OPEN →
    </a>

</div>

</div>

<script>

    const grid = document.getElementById("episodes-grid");

    for(let i = 1; i <= 179; i++){

        const link = document.createElement("a");

        link.href = `ep${i}_suae.html`;

        link.className = "episode-file";

        const img = document.createElement("img");

        img.src = "fileicon.png";

        const text = document.createElement("span");

        text.textContent =
            `suae_fit_${String(i).padStart(3, '0')}.exe`;

        link.appendChild(img);

        link.appendChild(text);

        grid.appendChild(link);
    }

</script>

</body>

</html>
